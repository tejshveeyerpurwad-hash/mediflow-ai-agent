name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: node --check server.js

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build

  ai-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      # Models are gitignored; train RF like Dockerfile before guardrail integration tests
      - run: python generate_dataset.py
      - run: python train_disease_model.py
      - run: python test_guardrail.py
      - name: Verify FastAPI Server Startup Health Check
        run: |
          python -m uvicorn main:app --host 127.0.0.1 --port 8000 &
          echo "Waiting for FastAPI server to download models and start..."
          # Try connecting to the health endpoint up to 12 times with 5s delay (total 60s max)
          for i in {1..12}; do
            if curl -s -f http://127.0.0.1:8000/health > /dev/null; then
              echo " AI Server is healthy and online!"
              exit 0
            fi
            echo "Server not ready yet, retrying in 5 seconds... (Attempt $i/12)"
            sleep 5
          done
          echo " AI Server failed to start within 60 seconds."
          exit 1
