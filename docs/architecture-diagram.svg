<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#555"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#ea580c"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9333ea"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e293b">SwasthAI Guardian Platform — Architecture</text>
  <text x="600" y="56" text-anchor="middle" font-size="12" fill="#64748b">AWS Region: ap-south-1</text>

  <!-- ==================== LAYER LABELS (vertical side) ==================== -->

  <!-- LAYER 1: CLIENT -->
  <rect x="16" y="78" width="170" height="200" rx="10" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="16" y="72" width="170" height="20" rx="4" fill="#2563eb"/>
  <text x="101" y="86" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Client Layer</text>

  <rect x="28" y="102" width="146" height="44" rx="6" fill="#dbeafe" stroke="#93c5fd" filter="url(#shadow)"/>
  <text x="101" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">React PWA</text>
  <text x="101" y="136" text-anchor="middle" font-size="9" fill="#3b82f6">Vite · Vercel Hosted</text>

  <rect x="28" y="156" width="146" height="44" rx="6" fill="#dbeafe" stroke="#93c5fd" filter="url(#shadow)"/>
  <text x="101" y="174" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">Offline IndexedDB</text>
  <text x="101" y="190" text-anchor="middle" font-size="9" fill="#3b82f6">Sync Queue · ONNX</text>

  <rect x="28" y="210" width="146" height="44" rx="6" fill="#dbeafe" stroke="#93c5fd" filter="url(#shadow)"/>
  <text x="101" y="228" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">Admin Dashboard</text>
  <text x="101" y="244" text-anchor="middle" font-size="9" fill="#3b82f6">SSE Live Feed</text>

  <!-- LAYER 2: BACKEND -->
  <rect x="196" y="78" width="280" height="280" rx="10" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="196" y="72" width="280" height="20" rx="4" fill="#16a34a"/>
  <text x="336" y="86" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Backend API (Render.com / AWS ECS)</text>

  <rect x="208" y="102" width="128" height="50" rx="6" fill="#dcfce7" stroke="#86efac" filter="url(#shadow)"/>
  <text x="272" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">Express.js</text>
  <text x="272" y="136" text-anchor="middle" font-size="9" fill="#16a34a">REST · SSE · JWT/OTP Auth</text>

  <rect x="346" y="102" width="118" height="50" rx="6" fill="#dcfce7" stroke="#86efac" filter="url(#shadow)"/>
  <text x="405" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">Policy Engine</text>
  <text x="405" y="136" text-anchor="middle" font-size="9" fill="#16a34a">IDOR · Role · Village Scope</text>

  <rect x="208" y="164" width="128" height="50" rx="6" fill="#dcfce7" stroke="#86efac" filter="url(#shadow)"/>
  <text x="272" y="182" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">Event Dispatcher</text>
  <text x="272" y="198" text-anchor="middle" font-size="9" fill="#16a34a">5 Event Types · DLQ</text>

  <rect x="346" y="164" width="118" height="50" rx="6" fill="#dcfce7" stroke="#86efac" filter="url(#shadow)"/>
  <text x="405" y="182" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">Audit Logger</text>
  <text x="405" y="198" text-anchor="middle" font-size="9" fill="#16a34a">Security &amp; Sync Logs</text>

  <rect x="208" y="226" width="256" height="50" rx="6" fill="#dcfce7" stroke="#86efac" filter="url(#shadow)"/>
  <text x="336" y="244" text-anchor="middle" font-size="11" font-weight="bold" fill="#166534">Health Watchdog</text>
  <text x="336" y="260" text-anchor="middle" font-size="9" fill="#16a34a">AI Service Health · 30s Interval · SSE Alerts</text>

  <rect x="208" y="288" width="256" height="50" rx="6" fill="#fef3c7" stroke="#fde68a" filter="url(#shadow)"/>
  <text x="336" y="306" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">SQLite (Dev/Offline Fallback)</text>
  <text x="336" y="322" text-anchor="middle" font-size="9" fill="#d97706">Zero-setup local evaluation</text>

  <!-- LAYER 3: AI SERVICE -->
  <rect x="16" y="378" width="170" height="230" rx="10" fill="none" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="16" y="372" width="170" height="20" rx="4" fill="#ea580c"/>
  <text x="101" y="386" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">AI Service</text>

  <rect x="28" y="402" width="146" height="44" rx="6" fill="#ffedd5" stroke="#fdba74" filter="url(#shadow)"/>
  <text x="101" y="420" text-anchor="middle" font-size="11" font-weight="bold" fill="#9a3412">SymptomNet MLP</text>
  <text x="101" y="436" text-anchor="middle" font-size="9" fill="#ea580c">101-class disease classifier</text>

  <rect x="28" y="456" width="146" height="44" rx="6" fill="#ffedd5" stroke="#fdba74" filter="url(#shadow)"/>
  <text x="101" y="474" text-anchor="middle" font-size="11" font-weight="bold" fill="#9a3412">Sakhi RAG Chatbot</text>
  <text x="101" y="490" text-anchor="middle" font-size="9" fill="#ea580c">Llama 3.3 · 243 chunks</text>

  <rect x="28" y="510" width="146" height="44" rx="6" fill="#ffedd5" stroke="#fdba74" filter="url(#shadow)"/>
  <text x="101" y="528" text-anchor="middle" font-size="11" font-weight="bold" fill="#9a3412">Pregnancy Risk AI</text>
  <text x="101" y="544" text-anchor="middle" font-size="9" fill="#ea580c">Vitals → Risk Level</text>

  <rect x="28" y="564" width="146" height="32" rx="6" fill="#fef2f2" stroke="#fecaca" filter="url(#shadow)"/>
  <text x="101" y="584" text-anchor="middle" font-size="10" font-weight="bold" fill="#991b1b">Outbreak Agent</text>

  <!-- LAYER 4: DATA -->
  <rect x="486" y="78" width="250" height="200" rx="10" fill="none" stroke="#9333ea" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="486" y="72" width="250" height="20" rx="4" fill="#9333ea"/>
  <text x="611" y="86" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Aurora PostgreSQL</text>

  <rect x="498" y="102" width="226" height="30" rx="4" fill="#f3e8ff" stroke="#d8b4fe" filter="url(#shadow)"/>
  <text x="611" y="121" text-anchor="middle" font-size="10" fill="#6b21a8">users · village_health · pregnancy_data</text>

  <rect x="498" y="140" width="226" height="30" rx="4" fill="#f3e8ff" stroke="#d8b4fe" filter="url(#shadow)"/>
  <text x="611" y="159" text-anchor="middle" font-size="10" fill="#6b21a8">symptoms · malnutrition_data · referrals</text>

  <rect x="498" y="178" width="226" height="30" rx="4" fill="#f3e8ff" stroke="#d8b4fe" filter="url(#shadow)"/>
  <text x="611" y="197" text-anchor="middle" font-size="10" fill="#6b21a8">ambulance_requests · vaccination_records</text>

  <rect x="498" y="216" width="226" height="30" rx="4" fill="#f3e8ff" stroke="#d8b4fe" filter="url(#shadow)"/>
  <text x="611" y="235" text-anchor="middle" font-size="10" fill="#6b21a8">government_schemes · district_config</text>

  <!-- DynamoDB -->
  <rect x="746" y="78" width="440" height="280" rx="10" fill="none" stroke="#059669" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="746" y="72" width="440" height="20" rx="4" fill="#059669"/>
  <text x="966" y="86" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Amazon DynamoDB (On-Demand Capacity)</text>

  <rect x="758" y="102" width="200" height="52" rx="6" fill="#d1fae5" stroke="#6ee7b7" filter="url(#shadow)"/>
  <text x="858" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">outbreak_telemetry</text>
  <text x="858" y="136" text-anchor="middle" font-size="9" fill="#059669">PK: villageId · SK: detectedAt</text>
  <text x="858" y="148" text-anchor="middle" font-size="9" fill="#059669">GSI: disease-index, district-time-index</text>

  <rect x="968" y="102" width="206" height="52" rx="6" fill="#d1fae5" stroke="#6ee7b7" filter="url(#shadow)"/>
  <text x="1071" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">emergency_streams</text>
  <text x="1071" y="136" text-anchor="middle" font-size="9" fill="#059669">PK: districtId · SK: streamId</text>
  <text x="1071" y="148" text-anchor="middle" font-size="9" fill="#059669">GSI: priority-index, district-date-index</text>

  <rect x="758" y="164" width="200" height="52" rx="6" fill="#d1fae5" stroke="#6ee7b7" filter="url(#shadow)"/>
  <text x="858" y="182" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">sync_queues</text>
  <text x="858" y="198" text-anchor="middle" font-size="9" fill="#059669">PK: deviceId · SK: queuedAt</text>
  <text x="858" y="210" text-anchor="middle" font-size="9" fill="#059669">GSI: status-index</text>

  <rect x="968" y="164" width="206" height="52" rx="6" fill="#d1fae5" stroke="#6ee7b7" filter="url(#shadow)"/>
  <text x="1071" y="182" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">village_node_state</text>
  <text x="1071" y="198" text-anchor="middle" font-size="9" fill="#059669">PK: villageId</text>
  <text x="1071" y="210" text-anchor="middle" font-size="9" fill="#059669">TTL: expiresAt (7 day)</text>

  <rect x="758" y="226" width="416" height="52" rx="6" fill="#d1fae5" stroke="#6ee7b7" filter="url(#shadow)"/>
  <text x="966" y="244" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">security_audit_logs</text>
  <text x="966" y="260" text-anchor="middle" font-size="9" fill="#059669">PK: actor · SK: timestamp</text>
  <text x="966" y="272" text-anchor="middle" font-size="9" fill="#059669">No GSI — actor-scoped compliance isolation</text>

  <rect x="758" y="288" width="416" height="52" rx="6" fill="#cffafe" stroke="#67e8f9" filter="url(#shadow)"/>
  <text x="966" y="306" text-anchor="middle" font-size="11" font-weight="bold" fill="#155e75">AWS S3 — Skin Condition Images</text>
  <text x="966" y="322" text-anchor="middle" font-size="9" fill="#0891b2">Pre-signed URLs · &lt;200KB compressed uploads</text>

  <!-- ==================== ARROWS ==================== -->

  <!-- Vercel → Express (REST + SSE) -->
  <line x1="174" y1="124" x2="206" y2="124" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)" stroke-dasharray="4,2"/>
  <text x="190" y="117" text-anchor="middle" font-size="8" fill="#2563eb" transform="rotate(-90,190,117)">REST</text>

  <line x1="174" y1="232" x2="206" y2="232" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)" stroke-dasharray="4,2"/>
  <text x="190" y="225" text-anchor="middle" font-size="8" fill="#2563eb" transform="rotate(-90,190,225)">SSE</text>

  <!-- Express → Aurora PostgreSQL -->
  <line x1="476" y1="124" x2="496" y2="124" stroke="#9333ea" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <text x="486" y="117" text-anchor="middle" font-size="8" fill="#9333ea">Transactional CRUD</text>

  <!-- Express → DynamoDB -->
  <line x1="476" y1="160" x2="756" y2="160" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="616" y="153" text-anchor="middle" font-size="8" fill="#059669">Telemetry · Emergency Streams · Sync Logs</text>

  <!-- Express → AI Service -->
  <line x1="272" y1="352" x2="101" y2="400" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)" stroke-dasharray="4,2"/>
  <text x="180" y="375" text-anchor="middle" font-size="8" fill="#ea580c">POST /predict/disease, /predict/pregnancy_risk, etc.</text>

  <!-- Outbreak Agent → Express -->
  <line x1="174" y1="580" x2="208" y2="310" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)" stroke-dasharray="4,2"/>
  <text x="175" y="440" text-anchor="middle" font-size="8" fill="#ea580c" transform="rotate(-70,175,440)">GET /admin/clusters</text>

  <line x1="174" y1="580" x2="208" y2="310" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)" stroke-dasharray="3,3"/>
  <text x="195" y="460" text-anchor="middle" font-size="8" fill="#ea580c" transform="rotate(-70,195,460)">POST /admin/outbreak-alert</text>

  <!-- Admin Dashboard → Health Detailed -->
  <line x1="101" y1="254" x2="101" y2="372" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="3,3"/>
  <text x="110" y="315" text-anchor="middle" font-size="8" fill="#64748b" transform="rotate(90,110,315)">GET /api/health/detailed</text>

  <!-- Legend -->
  <rect x="920" y="630" width="265" height="110" rx="8" fill="#fff" stroke="#cbd5e1" filter="url(#shadow)"/>
  <text x="1052" y="650" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b">Legend</text>

  <rect x="930" y="660" width="12" height="12" rx="2" fill="#2563eb"/>
  <text x="950" y="670" font-size="10" fill="#475569">Client → Backend (REST / SSE)</text>

  <rect x="930" y="680" width="12" height="12" rx="2" fill="#9333ea"/>
  <text x="950" y="690" font-size="10" fill="#475569">Backend → Aurora PostgreSQL (Transactional CRUD)</text>

  <rect x="930" y="700" width="12" height="12" rx="2" fill="#059669"/>
  <text x="950" y="710" font-size="10" fill="#475569">Backend → DynamoDB (Telemetry &amp; Events)</text>

  <rect x="930" y="720" width="12" height="12" rx="2" fill="#ea580c"/>
  <text x="950" y="730" font-size="10" fill="#475569">Backend ↔ AI Service (ML Predictions &amp; RAG)</text>

  <!-- Footer -->
  <text x="600" y="890" text-anchor="middle" font-size="9" fill="#94a3b8">B2B Operations — SwasthAI Guardian Platform</text>
</svg>